<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESMBA Workshop Board</title>
<style>
  :root{--navy:#0b2545;--blue:#2f6fb0;--sky:#5aa9e6;--ink:#eaf2fb;--muted:#9fb8d6;
    --card:#122c4f;--line:#1e4272;--green:#22c55e;--amber:#f5b301;--red:#ef4444;--purple:#a855f7;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif}
  html,body{height:100%;width:100%;background:var(--navy);color:var(--ink);overflow:hidden}
  body{display:flex;flex-direction:column;background:radial-gradient(1200px 700px at 80% -10%,#173863,var(--navy))}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;padding:1vh 1.6vw;
    background:linear-gradient(90deg,#08192f,#13315c);border-bottom:3px solid var(--sky)}
  .brand{display:flex;align-items:center;gap:1vw}
  .logo{width:3.2vw;height:3.2vw;min-width:42px;min-height:42px;border-radius:12px;
    background:linear-gradient(135deg,var(--sky),var(--blue));display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:1.5vw;color:#04121f}
  .brand h1{font-size:1.7vw;font-weight:800}
  .brand span{display:block;font-size:.8vw;color:var(--sky);font-weight:600;letter-spacing:3px}
  .rightbar{display:flex;align-items:center;gap:2vw}
  .weather{text-align:right;line-height:1.1}.weather .t{font-size:2vw;font-weight:800}.weather .d{font-size:.8vw;color:var(--muted)}
  .clock{text-align:right}.clock .time{font-size:2.3vw;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .clock .date{font-size:.95vw;color:var(--muted);font-weight:600}

  /* Board grid - single static screen */
  main{flex:1;padding:1.2vh 1.4vw;min-height:0}
  .board{display:grid;height:100%;gap:1vw;
    grid-template-columns:1.3fr 1.3fr 1fr;
    grid-template-rows:1fr 1fr 0.92fr;
    grid-template-areas:
      "work soon inc"
      "work soon out"
      "note note note";}
  .zone{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1vh 1vw;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .work{grid-area:work}.soon{grid-area:soon}.inc{grid-area:inc}.out{grid-area:out}.note{grid-area:note}
  .zone>h3{font-size:1.15vw;font-weight:800;color:#fff;display:flex;align-items:center;gap:.5vw;margin-bottom:.8vh;flex:0 0 auto}
  .zone>h3 .ico{font-size:1.35vw}
  .zone>h3 .count{margin-left:auto;font-size:.85vw;background:var(--blue);color:#04121f;font-weight:800;padding:.2vh .8vw;border-radius:999px}
  .zone>h3 .sub{margin-left:auto;font-size:.8vw;color:var(--muted);font-weight:600}
  .work>h3{border-left:5px solid var(--amber);padding-left:.6vw}
  .soon>h3{border-left:5px solid var(--sky);padding-left:.6vw}
  .inc>h3{border-left:5px solid var(--green);padding-left:.6vw}
  .out>h3{border-left:5px solid var(--purple);padding-left:.6vw}
  .list{display:flex;flex-direction:column;gap:.35vh;overflow:hidden;flex:1 1 auto;min-height:0}

  /* Job rows */
  .jrow{display:flex;align-items:center;gap:.7vw;padding:.5vh .2vw;border-bottom:1px solid rgba(30,66,114,.55)}
  .jrow:last-child{border-bottom:none}
  .jrow .tag{font-weight:800;color:var(--sky);width:6.6vw;flex:0 0 auto;font-size:.92vw}
  .jrow .desc{flex:1 1 auto;min-width:0;overflow:hidden}
  .jrow .desc .pj{font-size:.9vw;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .jrow .desc .pk{font-size:.75vw;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .jrow .prog{width:8vw;flex:0 0 auto;display:flex;align-items:center;gap:.5vw}
  .jrow .bar{flex:1;height:.9vh;background:#0a1e39;border-radius:999px;overflow:hidden}
  .jrow .bar>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--sky),var(--green))}
  .jrow .pct{font-size:.9vw;font-weight:800;width:2.8vw;text-align:right}
  .jrow .badge{font-size:.72vw;font-weight:800;padding:.2vh .6vw;border-radius:6px;text-transform:uppercase;white-space:nowrap}
  .b-wait{background:#334155;color:#cbd5e1}
  .more{font-size:.8vw;color:var(--muted);padding-top:.5vh;font-weight:700}
  .empty{color:var(--muted);font-size:.9vw;padding:1vh .2vw}

  /* Delivery rows */
  .drow{display:flex;align-items:center;gap:.7vw;padding:.55vh .2vw;border-bottom:1px solid rgba(30,66,114,.55)}
  .drow:last-child{border-bottom:none}
  .drow .tag{font-weight:800;color:var(--sky);width:6.4vw;flex:0 0 auto;font-size:.9vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .drow .txt{flex:1 1 auto;min-width:0;color:var(--ink);font-size:.88vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .drow .when{flex:0 0 auto;color:var(--muted);font-size:.82vw;font-weight:700;white-space:nowrap}
  .drow .when.late{color:var(--red)}
  .drow .when.today{color:var(--amber)}

  /* Notice / safety strip */
  .note{flex-direction:row;gap:1.2vw;align-items:stretch;padding:1vh 1.2vw}
  .safetybox{flex:0 0 auto;width:15vw;background:#0a1e39;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4vh;padding:1vh}
  .safetybox .big{font-size:5.2vw;font-weight:800;line-height:1;color:var(--green)}
  .safetybox .lbl{font-size:.85vw;color:var(--muted);letter-spacing:1px;text-transform:uppercase;text-align:center}
  .toolwrap{flex:0 0 auto;width:24vw;display:flex;flex-direction:column;gap:.9vh}
  .toolbox{background:#0a1e39;border-radius:12px;padding:1vh 1vw;flex:1}
  .toolbox .t{font-size:.8vw;color:var(--amber);font-weight:800;letter-spacing:2px}
  .toolbox .m{font-size:1.05vw;margin-top:.4vh;line-height:1.3}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:.9vw}
  .kpis .box{background:#0a1e39;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.9vh 0}
  .kpis .box b{font-size:2vw;font-weight:800}.kpis .box b.g{color:var(--green)}.kpis .box b.b{color:var(--sky)}
  .kpis .box span{font-size:.72vw;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:.2vh}
  .noticebox{flex:1 1 auto;background:#0a1e39;border-radius:12px;padding:1vh 1vw;display:flex;flex-direction:column;min-width:0}
  .noticebox .t{font-size:.85vw;color:var(--sky);font-weight:800;letter-spacing:2px;margin-bottom:.6vh}
  .noticebox .list{gap:.5vh}
  .nrow{display:flex;gap:.6vw;font-size:1vw;padding:.35vh 0;align-items:baseline}
  .nrow .dot{color:var(--amber);font-weight:800}
  .updated{position:fixed;bottom:.6vh;right:1vw;font-size:.72vw;color:var(--muted);opacity:.7}
</style></head>
<body>
<header>
  <div class="brand"><div class="logo">E</div><div><h1>ESMBA ENGINEERING</h1><span>WORKSHOP BOARD</span></div></div>
  <div class="rightbar">
    <div class="weather"><div class="t" id="wxTemp">--&deg;</div><div class="d" id="wxDesc">Brendale</div></div>
    <div class="clock"><div class="time" id="time">--:--</div><div class="date" id="date">&mdash;</div></div>
  </div>
</header>
<main>
  <section class="board">
    <div class="zone work">
      <h3><span class="ico">&#128295;</span> In the Workshop <span class="count" id="workCount">&mdash;</span></h3>
      <div class="list" id="workList"></div>
    </div>
    <div class="zone soon">
      <h3><span class="ico">&#9203;</span> Yet to Come to Workshop <span class="count" id="soonCount">&mdash;</span></h3>
      <div class="list" id="soonList"></div>
    </div>
    <div class="zone inc">
      <h3><span class="ico">&#128229;</span> Deliveries Due <span class="sub">this week &bull; PO</span></h3>
      <div class="list" id="incList"></div>
    </div>
    <div class="zone out">
      <h3><span class="ico">&#128228;</span> Dispatch Out <span class="sub">this week</span></h3>
      <div class="list" id="outList"></div>
    </div>
    <div class="zone note">
      <div class="safetybox">
        <div class="big" id="safeDays">--</div>
        <div class="lbl">Days since last incident</div>
      </div>
      <div class="toolwrap">
        <div class="toolbox"><div class="t">&#9888;&#65039; TOOLBOX TALK</div><div class="m" id="toolbox">&mdash;</div></div>
        <div class="kpis">
          <div class="box"><b class="g" id="kTonnes">--</b><span>Tonnes this month</span></div>
          <div class="box"><b class="b" id="kJobs">--</b><span>Jobs done (month)</span></div>
        </div>
      </div>
      <div class="noticebox">
        <div class="t">&#128226; NOTICE BOARD</div>
        <div class="list" id="notices"></div>
      </div>
    </div>
  </section>
</main>
<div class="updated" id="updated">updated &mdash;</div>

<script>
/* @@DATA_START@@  (Excel data.json feed overrides everything below at runtime) */
var PROJECTS = [
  { projNo:"E016", projName:"Griffith Uni - Queen St", client:"FDC Construction", pkgs:[
    { jobNo:"E016-03", pkg:"Skylight Stage", status:"In Progress", pct:64, fabStart:"2026-07-13", fabFin:"2026-07-24" },
    { jobNo:"E016-04", pkg:"Floor Infill", status:"In Progress", pct:35, fabStart:"2026-07-15", fabFin:"2026-07-28" },
    { jobNo:"E016-05", pkg:"Lintels", status:"Not Started", pct:0, fabStart:"", fabFin:"" } ]},
  { projNo:"E009", projName:"1 & 3 Clay Street, West Ipswich", client:"Visage Building Group", pkgs:[
    { jobNo:"E009-02", pkg:"Stage 2", status:"In Progress", pct:48, fabStart:"2026-07-14", fabFin:"2026-07-23" } ]},
  { projNo:"E004", projName:"Moffat Beach Industrial Warehouse", client:"Prekaro Projects", pkgs:[
    { jobNo:"E004-01", pkg:"BLD 3&4", status:"In Progress", pct:71, fabStart:"2026-07-06", fabFin:"2026-07-21" } ]},
  { projNo:"E017", projName:"Swift Storage Greenbank", client:"Total Construction", pkgs:[
    { jobNo:"E017-01", pkg:"BLD A", status:"Not Started", pct:0, fabStart:"", fabFin:"" },
    { jobNo:"E017-02", pkg:"BLD B", status:"Not Started", pct:0, fabStart:"", fabFin:"" } ]},
  { projNo:"E024", projName:"UQ Boat Shed - Door Frames", client:"Venn Constructions", pkgs:[
    { jobNo:"E024-01", pkg:"Door Frames", status:"Not Started", pct:0, fabStart:"", fabFin:"" } ]},
  { projNo:"E026", projName:"UQ QEVC - Roof Steel Works", client:"Fara", pkgs:[
    { jobNo:"E026-01", pkg:"Roof Steel Works", status:"Not Started", pct:0, fabStart:"", fabFin:"" } ]}
];
var BOARD = {
  safetyDays:128, toolbox:"Grinder guards & face shields - check before every use.",
  tonnesMonth:142, jobsMonth:9,
  notices:["RDO this Friday - workshop closed","New forklift induction Wed 10am","Amenities upgrade starts next week","SAFETY FIRST - report all near misses"],
  incoming:[{tag:"E016-03",txt:"Plate 20mm - Vulcan",when:""},{tag:"E009-02",txt:"Purlins - Metroll",when:""},{tag:"E004-01",txt:"Shaft/Steel - Southern",when:""}],
  outgoing:[{tag:"E014-01",txt:"38 HDG assemblies + purlins",when:""},{tag:"E016-05",txt:"Door frames to site",when:""}],
  ticker:[]
};
/* @@DATA_END@@ */
var DATA_URL = "data.json";
var $=function(id){return document.getElementById(id);};

/* ---- date helpers ---- */
function weekBounds(){
  var d=new Date();var dow=(d.getDay()+6)%7; /* Mon=0..Sun=6 */
  var mon=new Date(d.getFullYear(),d.getMonth(),d.getDate()-dow,0,0,0,0);
  var sun=new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+6,23,59,59,999);
  return [mon,sun];
}
function isoDate(s){ if(!s) return null; var m=/^(\d{4})-(\d{2})-(\d{2})/.exec(''+s); if(!m) return null; return new Date(+m[1],+m[2]-1,+m[3]); }
function startOfToday(){var d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0);}
var WD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function fmtWhen(s){ var dt=isoDate(s); if(!dt) return (s||''); return WD[dt.getDay()]+' '+('0'+dt.getDate()).slice(-2)+'/'+('0'+(dt.getMonth()+1)).slice(-2); }

/* ---- flatten jobs ---- */
function allJobs(){
  var j=[]; (PROJECTS||[]).forEach(function(p){ (p.pkgs||[]).forEach(function(k){
    var o={}; for(var x in k) o[x]=k[x];
    o.projNo=p.projNo||''; o.projName=p.projName||''; o.client=p.client||''; j.push(o);
  }); }); return j;
}
function isStarted(x){
  var st=(x.status||'').toLowerCase();
  if(st.indexOf('complete')>=0||st.indexOf('done')>=0) return false;
  if((+x.pct||0)>=100) return false;
  if((+x.pct||0)>0) return true;
  if(x.fabStart) return true;
  if(st.indexOf('progress')>=0||st.indexOf('fab')>=0) return true;
  return false;
}
function isComplete(x){ var st=(x.status||'').toLowerCase(); return (+x.pct||0)>=100||st.indexOf('complete')>=0||st.indexOf('done')>=0; }

/* ---- renderers ---- */
function jobRow(x,showBar){
  var desc='<div class="desc"><div class="pj">'+(x.projName||x.projNo||'')+'</div><div class="pk">'+(x.pkg||'')+'</div></div>';
  var right = showBar
    ? '<div class="prog"><div class="bar"><span style="width:'+Math.max(3,+x.pct||0)+'%"></span></div><div class="pct">'+(+x.pct||0)+'%</div></div>'
    : '<span class="badge b-wait">Awaiting</span>';
  return '<div class="jrow"><span class="tag">'+x.jobNo+'</span>'+desc+right+'</div>';
}
function renderWork(){
  var j=allJobs().filter(isStarted).sort(function(a,b){return (+b.pct||0)-(+a.pct||0);});
  $('workCount').textContent=j.length;
  var cap=9, html=j.slice(0,cap).map(function(x){return jobRow(x,true);}).join('');
  if(j.length>cap) html+='<div class="more">+ '+(j.length-cap)+' more in progress</div>';
  if(!j.length) html='<div class="empty">No jobs currently in the workshop.</div>';
  $('workList').innerHTML=html;
}
function renderSoon(){
  var j=allJobs().filter(function(x){return !isStarted(x)&&!isComplete(x);})
    .sort(function(a,b){return (a.jobNo>b.jobNo)?1:-1;});
  $('soonCount').textContent=j.length;
  var cap=11, html=j.slice(0,cap).map(function(x){return jobRow(x,false);}).join('');
  if(j.length>cap) html+='<div class="more">+ '+(j.length-cap)+' more waiting</div>';
  if(!j.length) html='<div class="empty">Nothing queued &mdash; all jobs underway.</div>';
  $('soonList').innerHTML=html;
}
function delRow(r,mode){
  var dt=isoDate(r.when), cls='', lbl=fmtWhen(r.when);
  if(dt){ var t0=startOfToday();
    if(dt<t0){ cls=' late'; lbl='LATE '+lbl; }
    else if(dt.getTime()===t0.getTime()){ cls=' today'; lbl='TODAY'; }
  }
  return '<div class="drow"><span class="tag">'+(r.tag||'')+'</span><span class="txt">'+(r.txt||'')+'</span><span class="when'+cls+'">'+lbl+'</span></div>';
}
function thisWeekFilter(list,includeOverdue){
  var wb=weekBounds(), mon=wb[0], sun=wb[1];
  return (list||[]).filter(function(r){
    var dt=isoDate(r.when);
    if(!dt) return true; /* unknown date -> keep */
    if(includeOverdue && dt<mon) return true; /* overdue deliveries still relevant */
    return dt>=mon && dt<=sun;
  }).sort(function(a,b){ var da=isoDate(a.when),db=isoDate(b.when);
    if(!da) return 1; if(!db) return -1; return da-db; });
}
function renderIncoming(){
  var rows=thisWeekFilter(BOARD.incoming,true);
  $('incList').innerHTML = rows.length ? rows.slice(0,8).map(function(r){return delRow(r,'in');}).join('')
    : '<div class="empty">No deliveries due this week.</div>';
}
function renderOutgoing(){
  var rows=thisWeekFilter(BOARD.outgoing,false);
  $('outList').innerHTML = rows.length ? rows.slice(0,8).map(function(r){return delRow(r,'out');}).join('')
    : '<div class="empty">Nothing scheduled out this week.</div>';
}
function renderNotice(){
  $('safeDays').textContent=(BOARD.safetyDays!=null?BOARD.safetyDays:'--');
  $('toolbox').textContent=BOARD.toolbox||'—';
  $('kTonnes').textContent=(BOARD.tonnesMonth!=null?BOARD.tonnesMonth:'--');
  $('kJobs').textContent=(BOARD.jobsMonth!=null?BOARD.jobsMonth:'--');
  var ns=(BOARD.notices||[]).slice(0,6);
  $('notices').innerHTML = ns.length ? ns.map(function(n){return '<div class="nrow"><span class="dot">&#9670;</span><span>'+n+'</span></div>';}).join('')
    : '<div class="empty">No notices.</div>';
}
function renderAll(){
  renderWork();renderSoon();renderIncoming();renderOutgoing();renderNotice();
  $('updated').textContent='updated '+new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
}
function loadData(){
  if(!DATA_URL){renderAll();return;}
  fetch(DATA_URL+'?t='+Date.now()).then(function(r){return r.json();}).then(function(d){
    if(d.PROJECTS)PROJECTS=d.PROJECTS; if(d.BOARD)BOARD=d.BOARD; renderAll();
  }).catch(function(){renderAll();});
}
function clock(){var d=new Date();
  $('time').textContent=d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',hour12:false});
  $('date').textContent=d.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function weather(){var u='https://api.open-meteo.com/v1/forecast?latitude=-27.31&longitude=152.98&current=temperature_2m,weather_code&timezone=Australia%2FBrisbane';
  fetch(u).then(function(r){return r.json();}).then(function(d){var c={0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Fog',51:'Drizzle',53:'Drizzle',61:'Rain',63:'Rain',65:'Heavy rain',80:'Showers',81:'Showers',95:'Storms',96:'Storms'};
    $('wxTemp').innerHTML=Math.round(d.current.temperature_2m)+'&deg;';$('wxDesc').textContent='Brendale · '+(c[d.current.weather_code]||'');}).catch(function(){});}

clock();loadData();weather();
setInterval(clock,1000);
setInterval(loadData,300000);      /* refresh data every 5 min */
setInterval(weather,900000);       /* weather every 15 min */
setTimeout(function(){location.reload();},1800000); /* full reload every 30 min */
</script></body></html>
